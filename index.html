<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireChat Enterprise v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --bg-main: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); overflow: hidden; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Animações */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilos do Chat */
        #chat-window { height: calc(100vh - 180px); }
        .message-bubble { max-width: 75%; transition: all 0.2s; }
        .message-bubble:hover { filter: brightness(0.95); }
        
        /* Painel Admin Lateral */
        .admin-log-entry { font-family: monospace; font-size: 11px; }
        
        /* Estado Online */
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; border: 2px solid white; }
        .online { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
        .offline { background-color: #94a3b8; }

        /* UI Overlays */
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="global-loader" class="fixed inset-0 z-50 flex items-center justify-center bg-white">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600"></div>
    </div>

    <div id="toast-container" class="fixed top-5 right-5 z-[100] space-y-2"></div>

    <div id="auth-screen" class="hidden fixed inset-0 z-40 flex items-center justify-center bg-slate-100 p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
            <div class="bg-blue-600 p-6 text-white text-center">
                <h1 class="text-3xl font-bold tracking-tighter">FIRECHAT</h1>
                <p class="text-blue-100 text-sm opacity-80">Comunicação em Tempo Real</p>
            </div>
            
            <div class="p-8">
                <div class="flex mb-6 bg-slate-100 rounded-lg p-1">
                    <button onclick="switchAuthTab('login')" id="tab-login" class="flex-1 py-2 rounded-md font-semibold text-blue-600 bg-white shadow-sm transition">Login</button>
                    <button onclick="switchAuthTab('register')" id="tab-register" class="flex-1 py-2 rounded-md font-semibold text-slate-500 transition">Registro</button>
                </div>

                <div id="auth-form-content">
                    <div id="nick-field" class="hidden mb-4">
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Escolha seu Nick</label>
                        <input type="text" id="auth-nick" placeholder="@exemplo" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">E-mail</label>
                        <input type="email" id="auth-email" placeholder="seu@email.com" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>

                    <div class="mb-6">
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Senha</label>
                        <input type="password" id="auth-pass" placeholder="••••••••" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>

                    <button onclick="processAuth()" id="auth-main-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">
                        Entrar na Conta
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-interface" class="hidden h-full flex flex-col md:flex-row">
        
        <aside class="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col h-full z-10">
            <div class="p-6 border-b">
                <div class="flex items-center gap-3 mb-6">
                    <div class="relative">
                        <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-xl" id="avatar-initial">?</div>
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 border-2 border-white rounded-full"></div>
                    </div>
                    <div>
                        <h2 id="user-nick-label" class="font-bold text-slate-800 leading-none truncate w-32">Carregando...</h2>
                        <span class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest">Online</span>
                    </div>
                </div>

                <div class="relative">
                    <input type="text" id="friend-search" placeholder="Adicionar amigo pelo Nick..." class="w-full p-2 pl-3 pr-10 bg-slate-100 rounded-lg text-sm focus:outline-blue-500">
                    <button onclick="requestAddFriend()" class="absolute right-2 top-1.5 text-blue-600 font-bold text-lg">+</button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto">
                <div class="p-4 uppercase text-[10px] font-bold text-slate-400 tracking-widest">Conversas Privadas</div>
                <div id="friends-container" class="space-y-1">
                    <div class="p-8 text-center text-slate-400 text-xs italic">Nenhum amigo online.</div>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-t flex justify-around">
                <button onclick="showAppSection('global')" class="p-2 text-slate-500 hover:text-blue-600 transition" title="Global Chat">🌎</button>
                <button onclick="showAppSection('admin')" class="p-2 text-slate-500 hover:text-red-600 transition" title="Admin Panel">🛡️</button>
                <button onclick="logout()" class="p-2 text-slate-500 hover:text-slate-900 transition" title="Sair">🚪</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-50 relative">
            
            <header class="bg-white/80 backdrop-blur-md p-4 border-b border-slate-200 flex justify-between items-center shadow-sm z-10">
                <div class="flex items-center gap-3">
                    <div id="current-chat-icon" class="w-10 h-10 bg-slate-200 rounded-full flex items-center justify-center text-slate-600">#</div>
                    <div>
                        <h3 id="current-chat-title" class="font-bold text-slate-800">Chat Global</h3>
                        <p id="current-chat-status" class="text-xs text-slate-500">Todos os usuários ativos</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleInfo()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100">ℹ️</button>
                </div>
            </header>

            <div id="chat-window" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3">
                </div>

            <div class="p-4 bg-white border-t border-slate-200">
                <div id="reply-preview" class="hidden p-2 bg-slate-50 mb-2 rounded-lg text-xs flex justify-between border-l-4 border-blue-500">
                    <span id="reply-text">Respondendo a...</span>
                    <button onclick="cancelReply()" class="text-slate-400">✕</button>
                </div>
                <div class="flex items-end gap-3 max-w-5xl mx-auto">
                    <div class="flex-1 bg-slate-100 rounded-2xl flex items-end p-2 border border-slate-200 focus-within:border-blue-400 focus-within:bg-white transition-all">
                        <button class="p-2 text-slate-400 hover:text-blue-500">😊</button>
                        <textarea id="main-input" rows="1" placeholder="Digite sua mensagem..." class="flex-1 p-2 bg-transparent outline-none resize-none max-h-32 text-slate-700"></textarea>
                    </div>
                    <button onclick="handleSendMessage()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all transform active:scale-90">
                        <svg class="w-6 h-6 rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                    </button>
                </div>
            </div>

            <div id="admin-modal" class="hidden absolute inset-0 z-30 modal-overlay flex items-center justify-center p-6">
                <div class="bg-white w-full max-w-4xl h-[80vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden">
                    <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
                        <h2 class="text-xl font-bold flex items-center gap-2">🛡️ Painel de Administração <span class="text-xs bg-red-600 px-2 py-1 rounded">RESTRICTED</span></h2>
                        <button onclick="closeAdmin()" class="text-slate-400 hover:text-white">✕</button>
                    </div>
                    
                    <div id="admin-auth-gate" class="flex-1 flex flex-center flex-col items-center justify-center p-10 text-center">
                        <div class="bg-slate-100 p-8 rounded-2xl w-full max-w-sm border border-slate-200">
                            <p class="mb-4 text-slate-600 font-semibold">Digite o código mestre para prosseguir</p>
                            <input type="password" id="admin-master-key" class="w-full p-4 text-center text-2xl tracking-[1em] border rounded-xl mb-4 focus:ring-2 focus:ring-red-500 outline-none">
                            <button onclick="unlockAdmin()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-black transition">Autenticar</button>
                        </div>
                    </div>

                    <div id="admin-main-view" class="hidden flex-1 flex flex-col md:flex-row overflow-hidden">
                        <div class="w-full md:w-1/3 border-r bg-slate-50 overflow-y-auto">
                            <div class="p-4 font-bold text-xs text-slate-400 uppercase">Gerenciar Membros</div>
                            <div id="admin-user-list" class="divide-y divide-slate-200">
                                </div>
                        </div>
                        <div class="flex-1 p-6 flex flex-col">
                            <div class="grid grid-cols-2 gap-4 mb-6">
                                <button onclick="adminGlobalClearChat()" class="p-4 bg-orange-50 border border-orange-200 text-orange-700 rounded-2xl hover:bg-orange-100 transition text-left">
                                    <p class="font-bold">Limpar Global</p>
                                    <p class="text-[10px] opacity-70">Apaga todo o histórico público</p>
                                </button>
                                <button class="p-4 bg-red-50 border border-red-200 text-red-700 rounded-2xl hover:bg-red-100 transition text-left">
                                    <p class="font-bold">Modo Silêncio</p>
                                    <p class="text-[10px] opacity-70">Desativa chat para não-admins</p>
                                </button>
                            </div>
                            <div class="flex-1 bg-black rounded-xl p-4 overflow-y-auto text-emerald-500 font-mono text-[11px]">
                                <p class="text-slate-500 border-b border-slate-800 pb-1 mb-2">SYSTEM CONSOLE LOGS</p>
                                <div id="admin-console-logs"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getDatabase, ref, set, push, onValue, remove, update, serverTimestamp, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // --- CONFIGURAÇÃO E INICIALIZAÇÃO ---
        const firebaseConfig = {
            apiKey: "AIzaSyBE1DrI03YtbpDhAJWoJpEgBX7lNrQVjx4",
            authDomain: "realtime-6f684.firebaseapp.com",
            databaseURL: "https://realtime-6f684-default-rtdb.firebaseio.com",
            projectId: "realtime-6f684",
            storageBucket: "realtime-6f684.firebasestorage.app",
            messagingSenderId: "758885154415",
            appId: "1:758885154415:web:76c0a17c8c4178fd2b179a",
            measurementId: "G-T3B2K71VS9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const analytics = getAnalytics(app);

        // VARIÁVEIS DE ESTADO GLOBAL
        let me = null;
        let activeChat = { id: 'global', type: 'public', title: 'Chat Global' };
        let authMode = 'login';
        let currentUnsubscribe = null;

        // --- SISTEMA DE UI (DOM) ---
        const ui = {
            loader: document.getElementById('global-loader'),
            authScreen: document.getElementById('auth-screen'),
            appInterface: document.getElementById('app-interface'),
            chatWindow: document.getElementById('chat-window'),
            mainInput: document.getElementById('main-input'),
            adminModal: document.getElementById('admin-modal'),
            toastContainer: document.getElementById('toast-container')
        };

        // --- LÓGICA DE AUTENTICAÇÃO ---
        window.switchAuthTab = (mode) => {
            authMode = mode;
            const isReg = mode === 'register';
            document.getElementById('nick-field').classList.toggle('hidden', !isReg);
            document.getElementById('tab-login').className = isReg ? "flex-1 py-2 rounded-md font-semibold text-slate-500 transition" : "flex-1 py-2 rounded-md font-semibold text-blue-600 bg-white shadow-sm transition";
            document.getElementById('tab-register').className = isReg ? "flex-1 py-2 rounded-md font-semibold text-blue-600 bg-white shadow-sm transition" : "flex-1 py-2 rounded-md font-semibold text-slate-500 transition";
            document.getElementById('auth-main-btn').innerText = isReg ? "Criar Minha Conta" : "Entrar na Conta";
        };

        window.processAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const nick = document.getElementById('auth-nick').value.trim();

            if (!email || !pass) return showToast("Preencha todos os campos!", "error");

            ui.loader.classList.remove('hidden');

            try {
                if (authMode === 'register') {
                    if (!nick) throw new Error("Escolha um Nickname!");
                    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, `users/${userCred.user.uid}`), {
                        nick: nick,
                        email: email,
                        id: userCred.user.uid,
                        muted: false,
                        banned: false,
                        online: true,
                        role: 'user',
                        createdAt: serverTimestamp()
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (error) {
                showToast(error.message, "error");
                ui.loader.classList.add('hidden');
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = ref(db, `users/${user.uid}`);
                onValue(userRef, (snap) => {
                    const data = snap.val();
                    if (!data) return;
                    if (data.banned) {
                        alert("🔴 Você foi banido permanentemente deste servidor.");
                        logout();
                        return;
                    }
                    me = data;
                    document.getElementById('user-nick-label').innerText = me.nick;
                    document.getElementById('avatar-initial').innerText = me.nick.charAt(0).toUpperCase();
                    
                    ui.authScreen.classList.add('hidden');
                    ui.appInterface.classList.remove('hidden');
                    ui.loader.classList.add('hidden');
                    
                    update(ref(db, `users/${me.id}`), { online: true });
                });

                initAppCore();
            } else {
                ui.authScreen.classList.remove('hidden');
                ui.appInterface.classList.add('hidden');
                ui.loader.classList.add('hidden');
            }
        });

        window.logout = () => {
            if (me) update(ref(db, `users/${me.id}`), { online: false });
            signOut(auth);
        };

        // --- SISTEMA DE CHAT (CORE) ---
        function initAppCore() {
            listenGlobalMessages();
            listenFriendsList();
            setupPresence();
        }

        function listenGlobalMessages() {
            if (currentUnsubscribe) currentUnsubscribe();
            
            const globalRef = ref(db, 'messages/global');
            currentUnsubscribe = onValue(globalRef, (snap) => {
                if (activeChat.id !== 'global') return;
                renderMessages(snap);
            });
        }

        window.handleSendMessage = () => {
            const text = ui.mainInput.value.trim();
            if (!text || !me) return;
            if (me.muted) return showToast("Você está impedido de falar no chat.", "error");

            const path = activeChat.type === 'public' 
                ? 'messages/global' 
                : `messages/private/${activeChat.id}`;

            push(ref(db, path), {
                senderId: me.id,
                senderNick: me.nick,
                text: text,
                timestamp: serverTimestamp()
            });

            ui.mainInput.value = "";
            ui.mainInput.style.height = 'auto';
        };

        function renderMessages(snap) {
            ui.chatWindow.innerHTML = "";
            snap.forEach(child => {
                const msg = child.val();
                const isMe = msg.senderId === me.id;
                
                const wrapper = document.createElement('div');
                wrapper.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-2 fade-in`;
                
                wrapper.innerHTML = `
                    <span class="text-[10px] text-slate-400 px-2 mb-1">${isMe ? 'Você' : msg.senderNick}</span>
                    <div class="message-bubble p-3 rounded-2xl shadow-sm text-sm ${
                        isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-slate-700 border border-slate-200 rounded-tl-none'
                    }">
                        ${msg.text}
                    </div>
                `;
                ui.chatWindow.appendChild(wrapper);
            });
            ui.chatWindow.scrollTop = ui.chatWindow.scrollHeight;
        }

        // --- AMIGOS E DIRECTS ---
        window.requestAddFriend = async () => {
            const targetNick = document.getElementById('friend-search').value.trim();
            if (!targetNick || targetNick === me.nick) return;

            const usersRef = ref(db, 'users');
            const snap = await get(usersRef);
            let found = null;
            
            snap.forEach(u => { if (u.val().nick === targetNick) found = u.val(); });

            if (found) {
                // Adiciona na lista de ambos (Relacionamento bidirecional)
                await set(ref(db, `friends/${me.id}/${found.id}`), { nick: found.nick, id: found.id });
                await set(ref(db, `friends/${found.id}/${me.id}`), { nick: me.nick, id: me.id });
                showToast(`@${found.nick} adicionado!`, "success");
                document.getElementById('friend-search').value = "";
            } else {
                showToast("Usuário não encontrado.", "error");
            }
        };

        function listenFriendsList() {
            onValue(ref(db, `friends/${me.id}`), (snap) => {
                const container = document.getElementById('friends-container');
                container.innerHTML = "";
                
                snap.forEach(child => {
                    const friend = child.val();
                    const friendId = child.key;

                    // Escuta status online do amigo
                    onValue(ref(db, `users/${friendId}/online`), (onSnap) => {
                        const isOnline = onSnap.val();
                        let friendEl = document.getElementById(`friend-card-${friendId}`);
                        
                        if (!friendEl) {
                            friendEl = document.createElement('div');
                            friendEl.id = `friend-card-${friendId}`;
                            friendEl.className = "flex items-center gap-3 p-3 mx-2 rounded-xl cursor-pointer hover:bg-slate-50 transition active:scale-95";
                            friendEl.onclick = () => openPrivateChat(friend);
                            container.appendChild(friendEl);
                        }

                        friendEl.innerHTML = `
                            <div class="relative">
                                <div class="w-10 h-10 bg-slate-200 rounded-full flex items-center justify-center font-bold text-slate-500">${friend.nick[0].toUpperCase()}</div>
                                <div class="absolute -bottom-1 -right-1 status-dot ${isOnline ? 'online' : 'offline'}"></div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-semibold text-slate-700 truncate">${friend.nick}</p>
                                <p class="text-[10px] ${isOnline ? 'text-emerald-500' : 'text-slate-400'} font-medium">${isOnline ? 'Disponível' : 'Offline'}</p>
                            </div>
                        `;
                    });
                });
            });
        }

        window.openPrivateChat = (friend) => {
            // Gera um ID de chat único baseado na ordenação alfabética dos IDs dos usuários
            const chatId = me.id < friend.id ? `${me.id}_${friend.id}` : `${friend.id}_${me.id}`;
            activeChat = { id: chatId, type: 'private', title: `@${friend.nick}` };
            
            document.getElementById('current-chat-title').innerText = activeChat.title;
            document.getElementById('current-chat-status').innerText = "Conversa Privada";
            document.getElementById('current-chat-icon').innerText = "👤";
            
            if (currentUnsubscribe) currentUnsubscribe();
            currentUnsubscribe = onValue(ref(db, `messages/private/${chatId}`), (snap) => {
                renderMessages(snap);
            });
            
            // Mobile: esconde sidebar se necessário (implementar toggle)
        };

        window.showAppSection = (type) => {
            if (type === 'global') {
                activeChat = { id: 'global', type: 'public', title: 'Chat Global' };
                document.getElementById('current-chat-title').innerText = "Chat Global";
                document.getElementById('current-chat-status').innerText = "Todos os usuários ativos";
                document.getElementById('current-chat-icon').innerText = "#";
                listenGlobalMessages();
            } else if (type === 'admin') {
                document.getElementById('admin-modal').classList.remove('hidden');
            }
        };

        // --- PAINEL ADMINISTRATIVO (LOGS E AÇÕES) ---
        window.unlockAdmin = () => {
            const key = document.getElementById('admin-master-key').value;
            if (key === "543") {
                document.getElementById('admin-auth-gate').classList.add('hidden');
                document.getElementById('admin-main-view').classList.remove('hidden');
                loadAdminUsersList();
                logToAdminConsole("Acesso administrativo autorizado.");
            } else {
                showToast("Chave Mestra Inválida", "error");
            }
        };

        function loadAdminUsersList() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('admin-user-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const u = child.val();
                    if (u.id === me.id) return;
                    
                    const div = document.createElement('div');
                    div.className = "p-4 hover:bg-white flex items-center justify-between";
                    div.innerHTML = `
                        <div>
                            <p class="font-bold text-sm text-slate-800">${u.nick} ${u.banned ? '🚫' : ''}</p>
                            <p class="text-[10px] text-slate-400">${u.email}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="adminToggleAction('${u.id}', 'muted', ${!u.muted})" class="p-2 rounded bg-slate-200 hover:bg-orange-200 text-xs">
                                ${u.muted ? '🔈' : '🔇'}
                            </button>
                            <button onclick="adminToggleAction('${u.id}', 'banned', ${!u.banned})" class="p-2 rounded bg-slate-200 hover:bg-red-200 text-xs">
                                ${u.banned ? '✅' : '⛔'}
                            </button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }

        window.adminToggleAction = (targetUid, field, value) => {
            update(ref(db, `users/${targetUid}`), { [field]: value });
            logToAdminConsole(`Usuário ${targetUid} atualizado: ${field} = ${value}`);
        };

        window.adminGlobalClearChat = () => {
            if (confirm("Deseja APAGAR TODAS as mensagens do Chat Global?")) {
                remove(ref(db, 'messages/global'));
                logToAdminConsole("Histórico do chat global foi limpo por um administrador.");
            }
        };

        function logToAdminConsole(msg) {
            const log = document.getElementById('admin-console-logs');
            const p = document.createElement('p');
            p.className = "admin-log-entry";
            p.innerText = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            log.prepend(p);
        }

        window.closeAdmin = () => {
            ui.adminModal.classList.add('hidden');
            document.getElementById('admin-master-key').value = "";
        };

        // --- UTILITÁRIOS ---
        function showToast(text, type = "info") {
            const t = document.createElement('div');
            t.className = `p-4 rounded-xl shadow-lg text-white font-bold text-sm fade-in ${type === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`;
            t.innerText = text;
            ui.toastContainer.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        function setupPresence() {
            // Gerenciamento de status offline ao fechar aba
            const myStatusRef = ref(db, `users/${auth.currentUser.uid}/online`);
            window.addEventListener('beforeunload', () => update(ref(db, `users/${me.id}`), { online: false }));
        }

        // Auto-expand textarea
        ui.mainInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

    </script>
</body>
